# PR quality gate for linkly-ai-cli (pure Rust crate).
# Runs format / lint / test on every PR and on pushes to main.
# Full cross-platform release builds live in release.yml (tag-triggered).
name: PR Check

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      # --locked fails the build if Cargo.lock is out of sync with Cargo.toml,
      # catching forgotten lockfile commits (and release-script version bumps).
      - name: Clippy (deny warnings)
        run: cargo clippy --locked --all-targets -- -D warnings

      - name: Test
        run: cargo test --locked
